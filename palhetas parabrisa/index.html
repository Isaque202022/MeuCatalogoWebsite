<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palhetas de parabrisa</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/ampliar-midia.css">
  <link rel="icon" href="imagens/pagina/icone-agua-guia-pagina.png">
</head>
<body>
  <div class="body">
    <div class="cabecalho">
      <button onclick="toggleModalFiltrar()">
        <span>FILTROS</span> 
        <img class="icone-filtrar-img" src="imagens/pagina/icone-filtrar.png">
      </button>
      <button onclick="toggleProdutosFixados(this)">
        <span>MOSTRAR APENAS ITENS FIXADOS</span>
        <img src="imagens/pagina/icone-fixar-vermelho.png">
      </button>
      <h2 id="titulo-cabecalho">
        <img src="imagens/pagina/palheta3.png" alt="">
        <span style="color: rgb(238, 250, 206);">PALHETAS</span>
      </h2>
    </div>

    <div class="content-sidebar-container">
      <div class="content">
        <div class="table-container" tabindex="0">
          <table id="table-produtos">
            <thead>
              <th class="fixar-th"><img style="width: 22px;" src="imagens/pagina/icone-fixar-branco.png" class=""></th>
              <th class="marca-th">
                <span>Marca</span> 
                <img src="imagens/pagina/icone-triangulo-ordenar.png" id="triangulo-ordenar-marca" class="triangulo-ordenar esconder">
              </th>
              <th class="ref-th">
                <span>Referência</span> 
                <img src="imagens/pagina/icone-triangulo-ordenar.png" id="triangulo-ordenar-ref" class="triangulo-ordenar esconder">
              </th>
              <th class="desc-th">
                <span>Descrição</span> 
                <img src="imagens/pagina/icone-triangulo-ordenar.png" id="triangulo-ordenar-desc" class="triangulo-ordenar">
              </th>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="aplicacoes">
          <div class="conversoes">
            <div>
              <div class="titulo">Conversões</div>
              <div class="lista"></div>
            </div>
          </div>
          <div class="carros">
            <div>
              <h2>Aplicações</h2>
              <div class="aplic-carros-tb-container">
                <table>
                  <thead>
                    <th id="carro-th-aplic">CARRO</th>
                    <th id="motor-th-aplic">MOTOR</th>
                    <th id="ano-th-aplic">ANO</th>
                    <th id="comp-th-aplic">COMPLEMENTO</th>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="display-container">
          <div class="img-container" onclick="abrirMidia(this)"></div>
          <div class="menu-imgs">
            <div class="seta-menu" onclick="mudarImg(indiceImgSelecionada-1)">
              <img src="imagens/pagina/seta-esquerda.png" alt="Voltar uma imagem"></div>
            <div class="indicador">
              <span id="indicador-img-atual"></span> /
              <span id="length-lista-imgs"></span>
            </div>
            <div class="seta-menu" onclick="mudarImg(indiceImgSelecionada+1)">
              <img src="imagens/pagina/seta-direita.png" alt="Próxima imagem"></div>
          </div>
        </div>
        <div class="informacoes">
          <!-- <div class="marca-ref">
            <span class="titulo">PROD.:</span><span class="valor-aqui"></span>
          </div> -->
          <div class="obs">
            <span class="titulo">OBS.:</span><span class="valor-aqui"></span>
          </div>
          <div class="conteudo-emb">
            <span class="titulo">CONTEÚDO EMBALAGEM:</span><span class="valor-aqui"></span>
          </div>
          <div class="propriedades">
            <span class="titulo">PROPRIEDADES:</span><span class="valor-aqui"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL PARA AMPLIAR IMAGEM E VIDEO FEITO PELO CHATGPT -->
  <div id="viewer" class="viewer">
    <div class="viewer-content">
      <button class="fechar" onclick="fecharViewer()">✕</button>
      <div class="viewer-midia"></div>
      <div class="viewer-controles">
        <button onclick="zoom-=0.2; atualizarTransform()">−</button>
        <button onclick="zoom=1; posX=0; posY=0; atualizarTransform()">⟳</button>
        <button onclick="zoom+=0.2; atualizarTransform()">+</button>
      </div>
    </div>
  </div>

  <div class="modal-midia esconder" >
    <div class="container">
      <div class="titulo">
        <p>SPAAL 10047</p>
        <p id="btn-exit" onclick="toggleModalMidia()">❌</p>
      </div>
      <div class="tela"></div>
      <div class="menu-imgs"></div>
    </div>
  </div>

  <div class="modal-filtrar esconder">
    <div class="container">
      <div class="titulo">
        <h4>FILTRAR</h4>
        <p class="btn-exit" onclick="toggleModalFiltrar()">❌</p>
      </div>
      <div class="campos-container">
        <table>
          <tr>
            <td colspan='3'>GERAL</td>
          </tr>
          <tr class="tr-desc">
            <td>Descrição</td>
            <td>
              <input id="campo-descricao1">
              <input id="campo-descricao2">
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo" 
                onclick="
                  document.getElementById('campo-descricao1').value = ''; 
                  document.getElementById('campo-descricao2').value = '';
                  document.getElementById('campo-descricao1').focus();
                  filtros.descricao[0] = '';
                  filtros.descricao[1] = '';
                  filtrarProdutos();
                "
              >
            </td>
          </tr>
          <!-- <tr class="tr-ref">
            <td>Referência</td>
            <td><input id="campo-referencia"></td>
            <td><img style="width: 27px; cursor: pointer;" src="imagens/pagina/icone-limpar.png" title="resetar campo"></td>
          </tr> -->
          <tr class="tr-ref">
            <td>Código</td>
            <td><input id="campo-cod-cruzado"></td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  document.getElementById('campo-cod-cruzado').value = '';
                  document.getElementById('campo-cod-cruzado').focus();
                  filtros.codCruzado = '';
                  filtrarProdutos()
                "
              >
            </td>
          </tr>
          <tr class="tr-marca">
            <td>Marca</td>
            <td>
              <select id="select-marca"></select>
              <div class="marca-selecionadas lista-selecionados"></div>
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  excluirTodasAsMarcas()
                  filtrarProdutos()
                "
              >
            </td>
          </tr>
          <tr>
            <td colspan='3'>PROPRIEDADES</td>
          </tr>
          <tr>
            <td>Posição</td>
            <td>
              <select id="select-posicao">
                <option value=""></option>
                <option value="dt">Dianteira</option>
                <option value="ts">Traseira</option>
              </select>
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  document.getElementById('select-posicao').selectedIndex = 0;
                  filtros.propriedades.posicao = '';
                  filtrarProdutos()
                "
              >
            </td>
          </tr>
          <tr>
            <td>Tamanho</td>
            <td class="layout-td-tamanho">
              <div id="aviso-furo"></div>
              <div class="campos">
                <div>De</div>
                <select id="select-tamanho-de" >
                  <option value=""></option>
                </select>
                <div>Até</div>
                <select id="select-tamanho-ate">
                  <option value=""></option>
                </select>
              </div>
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  document.getElementById('select-tamanho-de').selectedIndex = 0
                  document.getElementById('select-tamanho-ate').selectedIndex = 0
                  verificarTamanhoPalhetas('','de')
                  verificarTamanhoPalhetas('','ate')
                  filtros.propriedades.tamanho.de = null
                  filtros.propriedades.tamanho.ate = null
                  filtrarProdutos()
                "
              >
            </td>
          </tr>
          <tr>
            <td colspan='3'>APLICAÇÃO POR CARRO</td>
          </tr>
          <tr>
            <td>Montadora</td>
            <td>
              
              <div class="handcraft-container">
                <div class="select-montadora-handcraft select-hand">
                  <input class="input-handcraft" id="input-montadora" placeholder="Pesquisar..." onkeyup="renderizarMontadoras()">  
                  <div class="drop"></div>
                </div>
                <div class="montadoras-selecionadas lista-selecionados"></div>
              </div>
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  if (filtros.aplicacao.montadoras[0]){
                    excluirMontadora(filtros.aplicacao.montadoras[0]);
                    carregarListaVeiculos();
                    renderizarVeiculos();
                    filtrarProdutos()
                  }
                "
              >
            </td>
          </tr>
          <tr>
            <td>Veículo</td>
            <td>
              <div class="handcraft-container">
                <div class="select-veiculo-handcraft select-hand">
                  <input class="input-handcraft" id="input-veiculo" placeholder="Pesquisar..." onkeyup="renderizarVeiculos()">  
                  <div class="drop"></div>
                </div>
                <div class="veiculos-selecionados lista-selecionados"></div>
              </div>
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  if (filtros.aplicacao.veiculos[0]){
                    excluirVeiculo(filtros.aplicacao.veiculos[0])
                    filtrarProdutos()
                  }
                "
              >
            </td>
          </tr>
          <tr>
            <td>Ano</td>
            <td class="layout-td-ano">
              <div id="aviso-ano"></div>
              <div class="campos">
                <select id="select-ano-veiculo" disabled>
                  <option value="">Todos</option>
                </select>
              </div>
            </td>
            <td>
              <img 
                style="width: 27px; cursor: pointer;" 
                src="imagens/pagina/icone-limpar.png" 
                title="resetar campo"
                onclick="
                  if (!document.getElementById('select-ano-veiculo').disabled){
                    document.getElementById('select-ano-veiculo').selectedIndex = 0
                    filtros.aplicacao.ano = ''
                    filtrarProdutos()
                  }
                "
              >
            </td>
          </tr>
          <tr>
            <td colspan="3" id="td-limpar-todos-filtros">
              <button onclick="limparTodosOsFiltros()">Limpar todos os filtros</button>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </div>

  <script src="produtos/palhetas.js"></script>
  <script src="script/declarar-variaveis.js"></script>
  
  <script src="script/funcoes-gerais.js"></script>
  <script src="script/filtrar.js"></script>
  
  <script src="script/index.js"></script>
  <script src="script/ampliar-midia.js"></script>
  <script src="script/select-prod-setas.js"></script>
</body>
</html>
